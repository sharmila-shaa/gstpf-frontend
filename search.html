<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GST Practitioner Search</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            GST Practitioner Portal
        </a>

        <div>
            <a href="index.html" class="btn btn-light me-2">
                Home
            </a>

            <button
                class="btn btn-outline-light"
                onclick="logout()"
            >
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm p-4">
        <h2 class="mb-4">GST Practitioner Search</h2>

        <div class="row g-3">

            <div class="col-md-3">
                <input
                    id="name"
                    class="form-control"
                    placeholder="Practitioner Name"
                >
            </div>

            <div class="col-md-3">
                <select id="state" class="form-select">
                    <option value="">Select State</option>
                    <option value="33">Tamil Nadu</option>
                </select>
            </div>

            <div class="col-md-3">
                <select id="district_code" class="form-select">
                    <option value="">Select District</option>
                    <option value="TNCHE">Chennai</option>
                </select>
            </div>

            <div class="col-md-3">
                <input
                    id="pincode"
                    class="form-control"
                    placeholder="Pincode"
                    maxlength="6"
                    inputmode="numeric"
                >
            </div>

        </div>
        <div class="text-center">
        <button
            class="btn btn-primary mt-3 px-4"
            onclick="searchData()"
        >
            Search
        </button>
</div>
    </div>

    <div class="table-responsive mt-4">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Enrollment No</th>
                    <th>Name</th>
                    <th>Pincode</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>State</th>
                    <th>District</th>
                    <th>Address</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="result"></tbody>
        </table>
    </div>

</div>
<div class="mt-3 text-end">
    <button
        id="exportButton"
        class="btn btn-success px-4"
        onclick="exportCSV()"
        disabled
    >
        Export CSV
    </button>
</div>
<script src="config.js"></script>
<script>
let currentRecords = [];

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getAddress(row) {
    const addressParts = [
        row.adrs?.bldNo,
        row.adrs?.fltNo,
        row.adrs?.bldName,
        row.adrs?.road,
        row.adrs?.locality,
        row.adrs?.district
    ].filter(Boolean);

    return (
        row.address ||
        row.adr ||
        addressParts.join(", ")
    );
}

async function searchData() {
    const name = document.getElementById("name").value.trim();
    const state = document.getElementById("state").value;
    const district = document.getElementById("district_code").value;
    const pincode = document.getElementById("pincode").value.trim();

    const result = document.getElementById("result");
    const exportButton = document.getElementById("exportButton");

    currentRecords = [];
    exportButton.disabled = true;

    if (!name && !state && !district && !pincode) {
        alert("Enter at least one search value");
        return;
    }

    if (!state) {
        alert("Please select a state");
        return;
    }

    if (!district) {
        alert("Please select a district");
        return;
    }

    if (pincode && !/^\d{6}$/.test(pincode)) {
        alert("Pincode must contain exactly 6 digits");
        return;
    }

    const params = new URLSearchParams({
        name,
        state,
        district,
        pincode
    });

    result.innerHTML = `
        <tr>
            <td colspan="9" class="text-center">
                Loading...
            </td>
        </tr>
    `;

    try {
    const response = await fetch(
    `${API_BASE_URL}/api/gstp/search?${params.toString()}`
);

    const data = await response.json();
        if (!response.ok) {
            result.innerHTML = `
                <tr>
                    <td colspan="9" class="text-center text-danger">
                        ${escapeHtml(
                            data.error ||
                            "Unable to fetch GST Practitioner records"
                        )}
                    </td>
                </tr>
            `;

            return;
        }

        const records =
            Array.isArray(data) ? data :
            Array.isArray(data.data) ? data.data :
            Array.isArray(data.result) ? data.result :
            Array.isArray(data.gstpList) ? data.gstpList :
            [];

        currentRecords = records;
        exportButton.disabled = currentRecords.length === 0;

        console.log("First GST record:", records[0]);

        result.innerHTML = "";

        if (records.length === 0) {
            result.innerHTML = `
                <tr>
                    <td colspan="9" class="text-center">
                        No records found
                    </td>
                </tr>
            `;

            return;
        }

        records.forEach(row => {
            const enrollmentNo =
                row.enrollment_no ||
                row.enrollmentNo ||
                row.enrlNo ||
                row.enrolmentNo ||
                "";

            const practitionerName =
                row.name ||
                row.trpNam ||
                row.trpName ||
                "";

            const recordPincode =
                row.pincode ||
                row.pinCode ||
                row.pinCd ||
                row.pnCd ||
                row.adrs?.pinCode ||
                pincode ||
                "";

            const mobileNo =
                row.mobile_no ||
                row.mobileNo ||
                row.mbNo ||
                row.cntctNo ||
                "";

            const email =
                row.email_id ||
                row.emailId ||
                row.email ||
                "";

            const stateValue =
                row.state_name ||
                row.stateName ||
                row.state_code ||
                row.stCd ||
                row.adrs?.state ||
                (state === "33" ? "Tamil Nadu" : "");

            const districtValue =
                row.district_name ||
                row.districtName ||
                row.district_code ||
                row.dstCd ||
                row.dst ||
                row.adrs?.district ||
                (district === "TNCHE" ? "Chennai" : "");

            const statusValue =
                row.status === "Activ" || row.sts === "A"
                    ? "Active"
                    : row.status ||
                      row.sts ||
                      "";

            const fullAddress = getAddress(row);

            result.innerHTML += `
                <tr>
                    <td>${escapeHtml(enrollmentNo)}</td>
                    <td>${escapeHtml(practitionerName)}</td>
                    <td>${escapeHtml(recordPincode)}</td>
                    <td>${escapeHtml(mobileNo)}</td>
                    <td>${escapeHtml(email)}</td>
                    <td>${escapeHtml(stateValue)}</td>
                    <td>${escapeHtml(districtValue)}</td>
                    <td>${escapeHtml(fullAddress)}</td>
                    <td>${escapeHtml(statusValue)}</td>
                </tr>
            `;
        });

    } catch (error) {
        console.error("Search error:", error);

        result.innerHTML = `
            <tr>
                <td colspan="9" class="text-center text-danger">
                    Unable to connect to the server
                </td>
            </tr>
        `;
    }
}

function exportCSV() {
    if (currentRecords.length === 0) {
        alert("No records available to export");
        return;
    }

    const state = document.getElementById("state").value;
    const district = document.getElementById("district_code").value;
    const searchedPincode =
        document.getElementById("pincode").value.trim();

    const headers = [
        "Enrollment No",
        "Name",
        "Pincode",
        "Mobile",
        "Email",
        "State",
        "District",
        "Address",
        "Status"
    ];

    const rows = currentRecords.map(row => {
        const enrollmentNo =
            row.enrollment_no ||
            row.enrollmentNo ||
            row.enrlNo ||
            row.enrolmentNo ||
            "";

        const practitionerName =
            row.name ||
            row.trpNam ||
            row.trpName ||
            "";

        const pincode =
            row.pincode ||
            row.pinCode ||
            row.pinCd ||
            row.pnCd ||
            row.adrs?.pinCode ||
            searchedPincode ||
            "";

        const mobileNo =
            row.mobile_no ||
            row.mobileNo ||
            row.mbNo ||
            row.cntctNo ||
            "";

        const email =
            row.email_id ||
            row.emailId ||
            row.email ||
            "";

        const stateValue =
            row.state_name ||
            row.stateName ||
            row.state_code ||
            row.stCd ||
            row.adrs?.state ||
            (state === "33" ? "Tamil Nadu" : "");

        const districtValue =
            row.district_name ||
            row.districtName ||
            row.district_code ||
            row.dstCd ||
            row.dst ||
            row.adrs?.district ||
            (district === "TNCHE" ? "Chennai" : "");

        const status =
            row.status === "Activ" || row.sts === "A"
                ? "Active"
                : row.status ||
                  row.sts ||
                  "";

        const fullAddress = getAddress(row);

        return [
            enrollmentNo,
            practitionerName,
            pincode,
            mobileNo,
            email,
            stateValue,
            districtValue,
            fullAddress,
            status
        ];
    });

    const csvRows = [headers, ...rows]
        .map(row =>
            row.map(value => {
                const safeValue =
                    String(value ?? "").replaceAll('"', '""');

                return `"${safeValue}"`;
            }).join(",")
        )
        .join("\n");

    const csvBlob = new Blob(
        ["\uFEFF" + csvRows],
        {
            type: "text/csv;charset=utf-8;"
        }
    );

    const downloadUrl = URL.createObjectURL(csvBlob);
    const link = document.createElement("a");

    link.href = downloadUrl;

    link.download =
        `gst_practitioners_${
            searchedPincode || "search_results"
        }.csv`;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(downloadUrl);
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}
</script>

</body>
</html>
