```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>GST Practitioner Search</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            GST Practitioner Portal
        </a>

        <div>
            <a href="index.html" class="btn btn-light me-2">
                Home
            </a>

            <button
                class="btn btn-outline-light"
                onclick="logout()"
            >
                Logout
            </button>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm p-4">

        <h2 class="mb-4 text-center">
            GST Practitioner Search
        </h2>

        <div class="row justify-content-center">

            <div class="col-md-6">
                <input
                    id="pincode"
                    class="form-control"
                    placeholder="Enter 6-digit Pincode"
                    maxlength="6"
                    inputmode="numeric"
                >
            </div>

        </div>

        <div class="text-center">
            <button
                class="btn btn-primary mt-3 px-4"
                onclick="searchData()"
            >
                Search
            </button>
        </div>

    </div>

    <div class="table-responsive mt-4">

        <table class="table table-bordered table-striped align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Enrollment No</th>
                    <th>Name</th>
                    <th>Pincode</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>State</th>
                    <th>District</th>
                    <th>Address</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="result">
                <tr>
                    <td colspan="9" class="text-center text-muted">
                        Enter a pincode to search GST Practitioners
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

    <div class="mt-3 text-end">

        <button
            id="exportButton"
            class="btn btn-success px-4"
            onclick="exportCSV()"
            disabled
        >
            Export CSV
        </button>

    </div>

</div>

<script src="config.js"></script>

<script>
let currentRecords = [];

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function getAddress(row) {
    const addressParts = [
        row.adrs?.bldNo,
        row.adrs?.fltNo,
        row.adrs?.bldName,
        row.adrs?.road,
        row.adrs?.locality,
        row.adrs?.district
    ].filter(Boolean);

    return (
        row.address ||
        row.adr ||
        row.adrs?.addr ||
        addressParts.join(", ")
    );
}

function getEnrollmentNo(row) {
    return (
        row.enrollment_no ||
        row.enrollmentNo ||
        row.enrlNo ||
        row.enrolmentNo ||
        ""
    );
}

function getPractitionerName(row) {
    return (
        row.name ||
        row.trpNam ||
        row.trpName ||
        ""
    );
}

function getPincode(row, searchedPincode) {
    return (
        row.pincode ||
        row.pinCode ||
        row.pinCd ||
        row.pnCd ||
        row.adrs?.pinCode ||
        searchedPincode ||
        ""
    );
}

function getMobileNo(row) {
    return (
        row.mobile_no ||
        row.mobileNo ||
        row.mbNo ||
        row.cntctNo ||
        ""
    );
}

function getEmail(row) {
    return (
        row.email_id ||
        row.emailId ||
        row.email ||
        ""
    );
}

function getState(row) {
    return (
        row.state_name ||
        row.stateName ||
        row.state_code ||
        row.stCd ||
        row.adrs?.state ||
        ""
    );
}

function getDistrict(row) {
    return (
        row.district_name ||
        row.districtName ||
        row.district_code ||
        row.dstCd ||
        row.dst ||
        row.adrs?.district ||
        ""
    );
}

function getStatus(row) {
    if (row.status === "Activ" || row.sts === "A") {
        return "Active";
    }

    return (
        row.status ||
        row.sts ||
        ""
    );
}

async function searchData() {
    const pincode =
        document.getElementById("pincode")
            .value
            .trim();

    const result =
        document.getElementById("result");

    const exportButton =
        document.getElementById("exportButton");

    currentRecords = [];
    exportButton.disabled = true;

    if (!pincode) {
        alert("Please enter a pincode");
        return;
    }

    if (!/^\d{6}$/.test(pincode)) {
        alert("Pincode must contain exactly 6 digits");
        return;
    }

    const params = new URLSearchParams({
        pincode
    });

    result.innerHTML = `
        <tr>
            <td colspan="9" class="text-center">
                Loading...
            </td>
        </tr>
    `;

    try {
        const response = await fetch(
            `${API_BASE_URL}/api/gstp/search?${params.toString()}`
        );

        const data = await response.json();

        if (!response.ok) {
            result.innerHTML = `
                <tr>
                    <td
                        colspan="9"
                        class="text-center text-danger"
                    >
                        ${escapeHtml(
                            data.error ||
                            data.message ||
                            "Unable to fetch GST Practitioner records"
                        )}
                    </td>
                </tr>
            `;

            return;
        }

        const records =
            Array.isArray(data) ? data :
            Array.isArray(data.data) ? data.data :
            Array.isArray(data.result) ? data.result :
            Array.isArray(data.gstpList) ? data.gstpList :
            [];

        currentRecords = records;

        exportButton.disabled =
            currentRecords.length === 0;

        result.innerHTML = "";

        if (records.length === 0) {
            result.innerHTML = `
                <tr>
                    <td
                        colspan="9"
                        class="text-center"
                    >
                        No records found
                    </td>
                </tr>
            `;

            return;
        }

        records.forEach(row => {
            result.innerHTML += `
                <tr>
                    <td>
                        ${escapeHtml(getEnrollmentNo(row))}
                    </td>

                    <td>
                        ${escapeHtml(getPractitionerName(row))}
                    </td>

                    <td>
                        ${escapeHtml(getPincode(row, pincode))}
                    </td>

                    <td>
                        ${escapeHtml(getMobileNo(row))}
                    </td>

                    <td>
                        ${escapeHtml(getEmail(row))}
                    </td>

                    <td>
                        ${escapeHtml(getState(row))}
                    </td>

                    <td>
                        ${escapeHtml(getDistrict(row))}
                    </td>

                    <td>
                        ${escapeHtml(getAddress(row))}
                    </td>

                    <td>
                        ${escapeHtml(getStatus(row))}
                    </td>
                </tr>
            `;
        });

    } catch (error) {
        console.error("Search error:", error);

        result.innerHTML = `
            <tr>
                <td
                    colspan="9"
                    class="text-center text-danger"
                >
                    Unable to connect to the server
                </td>
            </tr>
        `;
    }
}

function exportCSV() {
    if (currentRecords.length === 0) {
        alert("No records available to export");
        return;
    }

    const searchedPincode =
        document.getElementById("pincode")
            .value
            .trim();

    const headers = [
        "Enrollment No",
        "Name",
        "Pincode",
        "Mobile",
        "Email",
        "State",
        "District",
        "Address",
        "Status"
    ];

    const rows = currentRecords.map(row => {
        return [
            getEnrollmentNo(row),
            getPractitionerName(row),
            getPincode(row, searchedPincode),
            getMobileNo(row),
            getEmail(row),
            getState(row),
            getDistrict(row),
            getAddress(row),
            getStatus(row)
        ];
    });

    const csvRows = [headers, ...rows]
        .map(row =>
            row.map(value => {
                const safeValue =
                    String(value ?? "")
                        .replaceAll('"', '""');

                return `"${safeValue}"`;
            }).join(",")
        )
        .join("\n");

    const csvBlob = new Blob(
        ["\uFEFF" + csvRows],
        {
            type: "text/csv;charset=utf-8;"
        }
    );

    const downloadUrl =
        URL.createObjectURL(csvBlob);

    const link =
        document.createElement("a");

    link.href = downloadUrl;

    link.download =
        `gst_practitioners_${searchedPincode}.csv`;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(downloadUrl);
}

function logout() {
    localStorage.removeItem("token");

    window.location.href =
        "login.html";
}
</script>

</body>
</html>
